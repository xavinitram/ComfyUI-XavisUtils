<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0"/>
      <stop offset="15%" stop-color="#e94560" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ff6b6b" stop-opacity="0.2"/>
      <stop offset="85%" stop-color="#e94560" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="12" fill="url(#bg)"/>

  <!-- Decorative node wires -->
  <path d="M 60 130 C 150 130, 180 40, 270 40" stroke="url(#wire)" stroke-width="2" fill="none"/>
  <path d="M 530 120 C 620 120, 650 50, 740 50" stroke="url(#wire)" stroke-width="2" fill="none"/>
  <path d="M 270 40 C 320 40, 340 110, 390 110" stroke="url(#wire)" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Node dots -->
  <circle cx="60" cy="130" r="4" fill="#e94560" opacity="0.6"/>
  <circle cx="270" cy="40" r="4" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="390" cy="110" r="4" fill="#e94560" opacity="0.3"/>
  <circle cx="530" cy="120" r="4" fill="#e94560" opacity="0.6"/>
  <circle cx="740" cy="50" r="4" fill="#ff6b6b" opacity="0.6"/>

  <!-- Title -->
  <text x="400" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="white" letter-spacing="1">Xavi's Utils</text>

  <!-- Subtitle -->
  <text x="400" y="105" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#a0a0b8" letter-spacing="2">HOUDINI-STYLE UX TOOLS FOR COMFYUI</text>

  <!-- Accent line under title -->
  <rect x="320" y="80" width="160" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
</svg>
